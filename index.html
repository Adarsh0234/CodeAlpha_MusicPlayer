<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayMe — Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrap">

        <div class="wordmark">
            <span class="wordmark-text">Album</span>
        </div>

        <div class="player-container">
            <div class="playlist-card">
                <div class="pl-header">
                    <span class="pl-label">Queue</span>
                    <div class="ap-row on" id="apToggle">
                        <div class="ap-pill"></div>
                        <span class="ap-label">Autoplay</span>
                    </div>
                </div>
                <div id="playlist"></div>
            </div>

            <div class="main-card" id="playerCard">

                <div class="art-frame">
                    <div class="art-ring"></div>
                    <div class="art-ring-2"></div>
                    <div class="art-box" id="albumArt"></div>
                </div>

                <div class="song-info">
                    <div class="song-title" id="songTitle">Midnight Reverie</div>
                    <div class="ornament-row">
                        <div class="orn-line"></div>
                        <div class="orn-diamond"></div>
                        <div class="orn-line"></div>
                    </div>
                    <div class="artist-name" id="artistName">Luna Waves</div>
                </div>

                <div class="progress-section">
                    <div class="progress-track" id="progressTrack">
                        <div class="progress-fill" id="progressFill">
                            <div class="p-thumb"></div>
                        </div>
                    </div>
                    <div class="time-row">
                        <span id="curTime">0:00</span>
                        <span id="totalTime">3:42</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="ctrl-btn" id="prevBtn" title="Previous">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                        </svg>
                    </button>
                    <button class="play-btn" id="playBtn" title="Play/Pause">
                        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" title="Next">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16 6h2v12h-2zm-1.5 6-8.5-6v12z" />
                        </svg>
                    </button>
                </div>

                <div class="volume-row">
                    <span class="vol-label">Volume</span>
                    <input type="range" id="volSlider" min="0" max="100" value="70" step="1" />
                    <span class="vol-pct" id="volVal">70%</span>
                </div>

            </div>
        </div>

    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script src="script.js"></script>
</body>

</html>
